version: "3.8"

services:
  postgres-db:
    image: postgres:18-alpine
    container_name: mini-crm-db
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql

  backend:
    build: ./backend
    container_name: mini-crm-backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      # localhost überschreiben...
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-db:5432/${DB_NAME}
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
    depends_on:
      - postgres-db #Backend startet erst wenn DB da ist.

  frontend:
    build: ./frontend
    container_name: mini-crm-frontend
    restart: always
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres-data:
